<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fleet Dashboard 2026</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#00d4ff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Fleet HQ"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%230b1120'/><linearGradient id='g' x1='0' y1='0' x2='192' y2='192'><stop offset='0' stop-color='%230077ff'/><stop offset='1' stop-color='%2300d4ff'/></linearGradient><rect width='192' height='192' rx='32' fill='url(%23g)' opacity='.8'/><path fill='white' d='M148 80h-24V56H36c-8.8 0-16 7.2-16 16v88h16c0 13.3 10.7 24 24 24s24-10.7 24-24h48c0 13.3 10.7 24 24 24s24-10.7 24-24h16v-40l-24-32zm-88 116c-6.6 0-12-5.4-12-12s5.4-12 12-12 12 5.4 12 12-5.4 12-12 12zm84-72h-28V88h20l16 20v16zm-12 72c-6.6 0-12-5.4-12-12s5.4-12 12-12 12 5.4 12 12-5.4 12-12 12z'/></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0b1120;
      --panel: #111827;
      --accent: #00d4ff;
      --accent2: #0077ff;
      --green: #00ffb0;
      --red: #ff4d6d;
      --yellow: #ffbe00;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: rgba(0,212,255,0.15);
    }
    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 16px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      pointer-events: none;
    }
    .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .icon-wrap {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px rgba(0,212,255,0.3);
    }
    .icon-wrap svg { width: 26px; height: 26px; fill: white; }
    h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; color: white; letter-spacing: 1px; }
    .subtitle { font-size: 0.75rem; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    #last-updated { font-size: 0.72rem; color: var(--muted); }
    #refresh-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none; border-radius: 8px;
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer;
    }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

    /* SEARCH */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    #search-box {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
    }
    #search-box:focus { border-color: var(--accent); }
    #search-box::placeholder { color: var(--muted); }
    #date-filter {
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      cursor: pointer;
    }

    /* TABLE */
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .table-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-title { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    #row-count { font-size: 0.75rem; color: var(--muted); }
    .scroll-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead tr { background: rgba(0,212,255,0.06); }
    th {
      padding: 12px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: white; }
    td {
      padding: 11px 14px;
      font-size: 0.82rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .badge-loc {
      background: rgba(0,212,255,0.1);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-time {
      background: rgba(0,255,176,0.08);
      color: var(--green);
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
    }
    .no-data {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(0,212,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
      </div>
      <div>
        <h1>FLEET DASHBOARD 2026</h1>
        <p class="subtitle">Track and Wheel Vehicle Management System (TWVM)</p>
      </div>
    </div>
    <div class="header-right">
      <span id="last-updated">Last updated: --</span>
      <a href="https://docs.google.com/spreadsheets/d/1-R1sjiB2XsNQwug9dAWNHr7s6TOaKBkZfUYuCUNySiU/edit" target="_blank" style="padding:8px 16px; background:rgba(0,255,176,0.1); border:1px solid rgba(0,255,176,0.3); border-radius:8px; color:#00ffb0; font-size:0.8rem; font-weight:600; text-decoration:none;">📊 Google Sheet</a>
      <button id="refresh-btn" onclick="loadData()">🔄 Refresh</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">--</div>
      <div class="stat-label">Total Check-Ins</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-today">--</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-locations">--</div>
      <div class="stat-label">Locations</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-units">--</div>
      <div class="stat-label">Units</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input type="text" id="search-box" placeholder="🔍  Search by name, location, unit..." oninput="filterData()"/>
    <input type="date" id="date-filter" onchange="filterData()"/>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">📋 SUBMISSION RECORDS</span>
      <span id="row-count">Loading...</span>
    </div>
    <div class="scroll-wrap">
      <div id="table-container">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading data...</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSiI8rf866g6d2kFHIqn4OwF2q5tlb6qM9OqXvKbG2YM5GDnhbU9YrZ82-oihkPGAalHIaQ_WKqPfCh/pub?gid=640801573&single=true&output=csv';

  var allData = [];
  var headers = [];

  function parseCSV(text) {
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    if (lines.length < 2) return { headers: [], rows: [] };
    function parseLine(line) {
      var result = []; var cur = ''; var inQ = false;
      for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      result.push(cur.trim());
      return result;
    }
    var hdrs = parseLine(lines[0]);
    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = parseLine(lines[i]);
      var row = {};
      for (var j = 0; j < hdrs.length; j++) row[hdrs[j]] = cols[j] || '';
      rows.push(row);
    }
    return { headers: hdrs, rows: rows };
  }

  function loadData() {
    document.getElementById('table-container').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading data...</p></div>';
    document.getElementById('row-count').textContent = 'Loading...';

    fetch(CSV_URL + '&t=' + Date.now())
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var parsed = parseCSV(text);
        headers = parsed.headers;
        allData = parsed.rows.reverse(); // newest first
        updateStats();
        filterData();
        var now = new Date();
        document.getElementById('last-updated').textContent = 'Updated: ' + now.toLocaleTimeString();
      })
      .catch(function() {
        document.getElementById('table-container').innerHTML = '<div class="no-data">❌ Failed to load data. Check your internet connection.</div>';
        document.getElementById('row-count').textContent = 'Error';
      });
  }

  function updateStats() {
    var today = new Date().toLocaleDateString('en-GB');
    var todayCount = 0;
    var locations = new Set();
    var units = new Set();

    allData.forEach(function(row) {
      var ts = row['Timestamp'] || '';
      if (ts.startsWith(today.split('/')[2]) || ts.includes(today)) todayCount++;
      if (row['Location of Vehicle']) locations.add(row['Location of Vehicle']);
      if (row['Unit']) units.add(row['Unit']);
    });

    // Count today by checking timestamp date
    var todayStr = new Date().toLocaleDateString();
    var todayCnt = allData.filter(function(row) {
      var ts = row['Timestamp'] || '';
      try { return new Date(ts).toLocaleDateString() === todayStr; } catch(e) { return false; }
    }).length;

    document.getElementById('stat-total').textContent = allData.length;
    document.getElementById('stat-today').textContent = todayCnt;
    document.getElementById('stat-locations').textContent = locations.size;
    document.getElementById('stat-units').textContent = units.size;
  }

  function filterData() {
    var search = document.getElementById('search-box').value.toLowerCase();
    var dateFilter = document.getElementById('date-filter').value;

    var filtered = allData.filter(function(row) {
      var matchSearch = !search || Object.values(row).some(function(v) {
        return v.toLowerCase().includes(search);
      });
      var matchDate = !dateFilter || (row['Timestamp'] || '').includes(dateFilter);
      return matchSearch && matchDate;
    });

    renderTable(filtered);
  }

  function renderTable(rows) {
    document.getElementById('row-count').textContent = rows.length + ' records';
    if (rows.length === 0) {
      document.getElementById('table-container').innerHTML = '<div class="no-data">🔍 No records found.</div>';
      return;
    }

    // Key columns to show (prioritized)
    var keyCols = ['Timestamp', 'Location of Vehicle', 'Unit', 'Rank name', 'Defects of Vehicle', 'Date and Time'];
    // Add remaining columns
    var otherCols = headers.filter(function(h) { return keyCols.indexOf(h) === -1; });
    var displayCols = keyCols.concat(otherCols);
    displayCols = displayCols.filter(function(h) { return headers.indexOf(h) !== -1; });

    var html = '<table><thead><tr>';
    html += '<th>#</th>';
    displayCols.forEach(function(h) { html += '<th>' + h + '</th>'; });
    html += '</tr></thead><tbody>';

    rows.forEach(function(row, i) {
      html += '<tr>';
      html += '<td style="color:var(--muted);font-size:0.72rem;">' + (i+1) + '</td>';
      displayCols.forEach(function(h) {
        var val = row[h] || '';
        if (h === 'Location of Vehicle' && val) {
          html += '<td><span class="badge-loc">📍 ' + val + '</span></td>';
        } else if (h === 'Timestamp' && val) {
          html += '<td><span class="badge-time">' + val + '</span></td>';
        } else {
          html += '<td title="' + val + '">' + val + '</td>';
        }
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('table-container').innerHTML = html;
  }

  // Auto-refresh every 60 seconds
  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
